<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>StudyBuddy</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-shell">
<div class="app">

<header class="topbar">

<div>
<p class="eyebrow">Tanulás egyszerűbben</p>
<h1>StudyBuddy</h1>
</div>

<div class="credit-pill">
<span class="credit-pill-label">Kredit</span>
<span class="credit-pill-value" id="credit">10</span>
</div>

</header>


<main class="content">

<section id="home" class="section active">

<div class="hero-card">

<h2 id="welcomeText">Szia!</h2>

<p>Segíts másoknak vagy kérj segítséget.</p>

<div class="hero-actions">

<button class="primary-btn"
onclick="showSection('request')">
Segítséget kérek
</button>

<button class="ghost-btn"
onclick="showSection('helpers')">
Segíteni szeretnék
</button>

</div>

</div>

</section>


<section id="request" class="section">

<div class="card">

<h2>Segítségkérés</h2>

<form id="requestForm">

<label>Tantárgy</label>

<select id="subject">
<option>Matek</option>
<option>Magyar</option>
<option>Angol</option>
<option>Történelem</option>
<option>Informatika</option>
</select>

<label>Téma</label>

<input
type="text"
id="topic"
placeholder="Pl. egyenlet"
required
>

<label>Leírás</label>

<textarea
id="description"
rows="4"
required
></textarea>

<button class="primary-btn">
Segítséget kérek
</button>

</form>

</div>

</section>


<section id="helpers" class="section">

<div class="card">

<h2>Segítők</h2>

<div id="helperList"></div>

</div>

</section>


<section id="profile" class="section">

<div class="card">

<h2>Profil</h2>

<p><strong>Név:</strong> <span id="profileName"></span></p>

<p><strong>Kredit:</strong> <span id="profileCredit"></span></p>

<button onclick="toggleTheme()" class="ghost-btn">
Dark / Light mód
</button>

<button onclick="resetApp()" class="danger-btn">
Alaphelyzet
</button>

</div>

</section>

</main>


<nav class="bottom-nav">

<button class="nav-btn active"
onclick="showSection('home', this)">

🏠
<span>Kezdőlap</span>

</button>


<button class="nav-btn"
onclick="showSection('request', this)">

➕
<span>Kérés</span>

</button>


<button class="nav-btn"
onclick="showSection('helpers', this)">

⭐
<span>Segítők</span>

</button>


<button class="nav-btn"
onclick="showSection('profile', this)">

👤
<span>Profil</span>

</button>

</nav>

</div>
</div>


<div id="loginModal" class="modal hidden">

<div class="modal-box">

<h2>Üdv!</h2>

<p>Add meg a neved</p>

<input id="nameInput" placeholder="Neved">

<button class="primary-btn" onclick="saveName()">
Belépés
</button>

</div>

</div>


<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
